name: Bug report
description: Report a reproducible problem in ForecastMe
title: "[Bug]: "
labels:
  - bug
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Provide enough detail for the issue to be reproduced.

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Clearly describe what went wrong.
      placeholder: Describe the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Start the application
        2. Navigate to ...
        3. Perform ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what should have happened.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what happened instead.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Web application
        - NestJS API
        - Python prediction service
        - Shared contracts
        - Local infrastructure
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Branch or commit
      description: Provide the branch name or commit hash where the issue occurred.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include operating system, Node.js, pnpm, Python, browser, or Docker versions.
      placeholder: |
        OS:
        Node.js:
        pnpm:
        Python:
        Docker:
        Browser:

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues before submitting this report.
          required: true
        - label: I removed secrets, credentials, and personal data from logs.
          required: true