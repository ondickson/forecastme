services:
  postgres:
    image: postgres:17
    container_name: forecastme-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
           "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


    networks:
      - forecastme-network

  redis:
    image: redis:8
    container_name: forecastme-redis
    restart: unless-stopped

    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      ]

    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:?REDIS_PASSWORD is required}",
          "ping"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - forecastme-network

  minio:
    image: minio/minio:latest
    container_name: forecastme-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}

    ports:
      - "${MINIO_API_PORT:?MINIO_API_PORT is required}:9000"
      - "${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required}:9001"

    volumes:
      - minio_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:9000/minio/health/live"
        ]
      interval: 30s
      timeout: 20s
      retries: 3

    networks:
      - forecastme-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forecastme-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}

    ports:
      - "${PGADMIN_PORT:?PGADMIN_PORT is required}:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - forecastme-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:

networks:
  forecastme-network:
    driver: bridge
